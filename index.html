<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naturia — Plateforme Clinique</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--card:#1c2330;--border:#30363d;--border2:#21262d;--accent:#3fb68b;--accent2:#2ea373;--accent-dim:rgba(63,182,139,0.12);--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;--danger:#f85149;--warning:#d29922;--info:#58a6ff;--r:10px;--rlg:16px;--sw:240px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 20% 50%,rgba(63,182,139,0.08),transparent 60%),var(--bg)}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);padding:2.5rem;width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.auth-logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem}
.auth-logo-icon{width:42px;height:42px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.auth-logo-text{font-family:'Fraunces',serif;font-size:1.5rem;color:var(--accent);font-weight:600}
.auth-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;background:var(--bg3);border-radius:8px;padding:.25rem}
.auth-tab{flex:1;padding:.5rem;text-align:center;border-radius:6px;cursor:pointer;font-size:.875rem;color:var(--text2);transition:.2s;border:none;background:none;font-family:inherit}
.auth-tab.active{background:var(--accent);color:#000;font-weight:600}

/* FORMS */
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:.4rem;font-weight:500}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.65rem .9rem;color:var(--text);font-size:.9rem;font-family:inherit;outline:none;transition:.2s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
select.form-input{cursor:pointer}
textarea.form-input{resize:vertical;min-height:80px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.1rem;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:.875rem;font-weight:500;transition:.2s}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(248,81,73,0.15);color:var(--danger);border:1px solid rgba(248,81,73,0.3)}
.btn-lg{padding:.8rem 1.5rem;font-size:1rem;border-radius:10px}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:.35rem .75rem;font-size:.78rem}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;padding:1.25rem 0}
.sidebar-logo{display:flex;align-items:center;gap:.65rem;padding:0 1.25rem 1.5rem;border-bottom:1px solid var(--border2);margin-bottom:1rem}
.sidebar-logo-icon{width:34px;height:34px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.sidebar-logo-text{font-family:'Fraunces',serif;font-size:1.15rem;color:var(--accent);font-weight:600}
.nav-section{padding:0 .75rem;margin-bottom:.25rem}
.nav-label{font-size:.68rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:.6rem .5rem .3rem}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.6rem .75rem;border-radius:8px;cursor:pointer;color:var(--text2);font-size:.875rem;transition:.15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
.sidebar-bottom{margin-top:auto;padding:1rem .75rem 0;border-top:1px solid var(--border2)}
.user-card{display:flex;align-items:center;gap:.65rem;padding:.65rem .75rem;border-radius:8px;cursor:pointer;transition:.15s}
.user-card:hover{background:var(--bg3)}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;color:var(--accent);flex-shrink:0}
.user-name{font-size:.8rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:.7rem;color:var(--text3)}
.main{margin-left:var(--sw);flex:1;padding:2rem;min-height:100vh}

/* PAGE */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.75rem}
.page-title{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:600}
.page-sub{color:var(--text2);font-size:.875rem;margin-top:.25rem}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rlg);padding:1.25rem}
.card-title{font-size:.78rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rlg);padding:1.1rem 1.25rem;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.stat-label{font-size:.75rem;color:var(--text2);font-weight:500;margin-bottom:.5rem}
.stat-value{font-family:'Fraunces',serif;font-size:2rem;font-weight:600;line-height:1}
.stat-sub{font-size:.75rem;color:var(--accent);margin-top:.3rem}
.stat-icon{position:absolute;top:1rem;right:1rem;font-size:1.3rem}

/* GRIDS */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
.table{width:100%;border-collapse:collapse}
.table th{background:var(--bg3);padding:.7rem 1rem;text-align:left;font-size:.75rem;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.table td{padding:.75rem 1rem;border-top:1px solid var(--border2);font-size:.875rem;vertical-align:middle}
.table tr:hover td{background:rgba(255,255,255,0.02)}

/* SEARCH */
.search-wrap{position:relative;flex:1;max-width:380px}
.search-wrap input{padding-left:2.5rem}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.filter-pills{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.pill{padding:.35rem .85rem;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:.78rem;cursor:pointer;transition:.15s}
.pill.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.pill:hover{border-color:var(--accent);color:var(--accent)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.modal.modal-lg{max-width:820px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border2)}
.modal-title{font-size:1.05rem;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:1.2rem;padding:.25rem .5rem;border-radius:6px}
.modal-close:hover{color:var(--text);background:var(--bg3)}
.modal-body{padding:1.5rem;overflow-y:auto;flex:1}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border2);display:flex;gap:.75rem;justify-content:flex-end}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:.2rem .65rem;border-radius:20px;font-size:.72rem;font-weight:500}
.badge-green{background:rgba(63,182,139,0.15);color:var(--accent);border:1px solid rgba(63,182,139,0.3)}
.badge-red{background:rgba(248,81,73,0.12);color:var(--danger);border:1px solid rgba(248,81,73,0.25)}
.badge-yellow{background:rgba(210,153,34,0.12);color:var(--warning);border:1px solid rgba(210,153,34,0.25)}
.badge-blue{background:rgba(88,166,255,0.12);color:var(--info);border:1px solid rgba(88,166,255,0.25)}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* TOAST */
.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:2000;display:flex;flex-direction:column;gap:.5rem}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.75rem 1.1rem;font-size:.875rem;display:flex;align-items:center;gap:.65rem;box-shadow:0 4px 24px rgba(0,0,0,0.4);animation:slideIn .3s ease;min-width:260px;cursor:pointer}
.toast-success{border-color:rgba(63,182,139,0.4)}
.toast-error{border-color:rgba(248,81,73,0.4)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* PATIENT */
.patient-row{display:flex;align-items:center;gap:1rem;padding:.75rem 1rem;border-radius:8px;cursor:default;transition:.15s;border:1px solid transparent}
.patient-row:hover{background:var(--bg3);border-color:var(--border)}
.patient-avatar{width:38px;height:38px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(63,182,139,0.3);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--accent);font-size:.9rem;flex-shrink:0}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 180px)}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
.chat-msg{display:flex;gap:.65rem;max-width:85%}
.chat-msg.user{flex-direction:row-reverse;margin-left:auto}
.chat-bubble{padding:.75rem 1rem;border-radius:12px;font-size:.875rem;line-height:1.6;white-space:pre-wrap}
.chat-msg.user .chat-bubble{background:var(--accent);color:#000;border-radius:12px 12px 0 12px}
.chat-msg.ai .chat-bubble{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:12px 12px 12px 0}
.chat-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;background:var(--bg3)}
.chat-input-row{padding:1rem;border-top:1px solid var(--border);display:flex;gap:.75rem}

/* SUPP */
.supp-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;cursor:pointer;transition:.2s}
.supp-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.supp-cat{font-size:.68rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
.supp-nom{font-size:.875rem;font-weight:600;margin-bottom:.3rem;line-height:1.3}
.supp-dose{font-size:.75rem;color:var(--text2)}

/* DIVIDER */
hr.divider{border:none;border-top:1px solid var(--border2);margin:1.25rem 0}

/* LOADING */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;gap:.75rem;color:var(--text2)}
.empty{text-align:center;padding:3rem;color:var(--text2)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}
.empty-title{font-size:1rem;font-weight:500;color:var(--text);margin-bottom:.3rem}

/* AGENDA */
.rdv-item{display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;border-bottom:1px solid var(--border2)}
.rdv-time{font-size:.75rem;font-weight:600;color:var(--accent);min-width:55px}
.rdv-title{font-size:.875rem;font-weight:500}
.rdv-patient{font-size:.75rem;color:var(--text2)}
.agenda-day{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:.75rem;overflow:hidden}
.agenda-day-hdr{padding:.65rem 1rem;background:var(--bg3);font-size:.8rem;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border2)}

/* ALERT */
.alert{padding:.75rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem}
.alert-error{background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.3);color:var(--danger)}
.alert-success{background:rgba(63,182,139,0.1);border:1px solid rgba(63,182,139,0.3);color:var(--accent)}
</style>

function $(id) { return document.getElementById(id); }
function html(el, content) { if(el) el.innerHTML = content; }
function show(id) { const el=$(id); if(el) el.style.display=''; }
function hide(id) { const el=$(id); if(el) el.style.display='none'; }

function toast(msg, type='success') {
  const wrap = $('toast-wrap') || (() => {
    const d = document.createElement('div');
    d.id = 'toast-wrap'; d.className = 'toast-wrap';
    document.body.appendChild(d); return d;
  })();
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = (type==='success'?'✅ ':'❌ ') + msg;
  t.onclick = () => t.remove();
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

const ERREURS = {
  'Invalid login credentials': 'Email ou mot de passe incorrect.',
  'User already registered': 'Un compte existe déjà avec cet email.',
  'Password should be at least 6 characters': 'Le mot de passe doit contenir au moins 6 caractères.',
  'email rate limit exceeded': 'Trop de tentatives. Attendez quelques minutes.',
  'For security purposes': 'Veuillez attendre quelques secondes avant de réessayer.',
  'Database error': 'Erreur serveur. Réessayez.',
};
function tradErr(msg) {
  for(const [k,v] of Object.entries(ERREURS)) { if(msg&&msg.includes(k)) return v; }
  return msg || 'Une erreur est survenue.';
}

function modal(content, size='') {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal ${size}">${content}</div>`;
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
  return overlay;
}

function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
}

async function authSubmit(mode) {
  const email = $('auth-email')?.value?.trim();
  const pwd = $('auth-pwd')?.value;
  const alertEl = $('auth-alert');
  const btn = $('auth-btn');

  function setAlert(msg, type='error') {
    if(alertEl) alertEl.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }

  if(!email||!pwd) { setAlert('Email et mot de passe requis'); return; }
  if(btn) { btn.disabled=true; btn.textContent='…'; }

  try {
    if(mode==='login') {
      const {data,error} = await sb.auth.signInWithPassword({email,password:pwd});
      if(error) throw error;
      await loadApp(data.user);
    } else {
      const prenom = $('auth-prenom')?.value?.trim()||'';
      const nom = $('auth-nom')?.value?.trim()||'';
      if(!prenom||!nom) { setAlert('Tous les champs sont requis'); return; }
      if(pwd.length<6) { setAlert('Le mot de passe doit contenir au moins 6 caractères'); return; }
      const {data,error} = await sb.auth.signUp({email,password:pwd,options:{data:{nom,prenom}}});
      if(error) throw error;
      if(data.user) {
        await sb.from('therapists').update({nom,prenom}).eq('id',data.user.id);
        const {data:ld,error:le} = await sb.auth.signInWithPassword({email,password:pwd});
        if(le) throw le;
        await loadApp(ld.user);
      }
    }
  } catch(e) {
    setAlert(tradErr(e.message));
    if(btn) { btn.disabled=false; btn.textContent=mode==='login'?'Se connecter':'Créer mon compte'; }
  }
}

async function forgotPassword() {
  const email = $('auth-email')?.value?.trim();
  const alertEl = $('auth-alert');
  if(!email) { if(alertEl) alertEl.innerHTML='<div class="alert alert-error">Entrez votre email ci-dessus</div>'; return; }
  try {
    await sb.auth.resetPasswordForEmail(email);
    if(alertEl) alertEl.innerHTML='<div class="alert alert-success">Email de réinitialisation envoyé !</div>';
  } catch(e) {
    if(alertEl) alertEl.innerHTML=`<div class="alert alert-error">${tradErr(e.message)}</div>`;
  }
}

      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="savePatient('${id||''}')">Enregistrer</button>

async function savePatient(id) {
  const data = {
    prenom: $('p-prenom')?.value?.trim(),
    nom: $('p-nom')?.value?.trim(),
    email: $('p-email')?.value?.trim(),
    telephone: $('p-tel')?.value?.trim(),
    date_naissance: $('p-dob')?.value||null,
    sexe: $('p-sexe')?.value,
    profil: $('p-profil')?.value,
    notes: $('p-notes')?.value?.trim(),
  };
  const alertEl = $('patient-alert');
  if(!data.prenom||!data.nom) { if(alertEl) alertEl.innerHTML='<div class="alert alert-error">Nom et prénom requis</div>'; return; }

  try {
    if(id) {
      const {error} = await sb.from('patients').update({...data,updated_at:new Date().toISOString()}).eq('id',id);
      if(error) throw error;
      STATE.patients = STATE.patients.map(p=>p.id===id?{...p,...data}:p);
      toast('Patient modifié');
    } else {
      const {data:res,error} = await sb.from('patients').insert([{...data,therapist_id:STATE.user.id}]).select().single();
      if(error) throw error;
      STATE.patients.unshift(res);
      toast('Patient ajouté');
    }
    closeModal();
    renderView($('main-content'));
  } catch(e) { if(alertEl) alertEl.innerHTML=`<div class="alert alert-error">${tradErr(e.message)}</div>`; }
}

async function deletePatient(id) {
  const p = STATE.patients.find(x=>x.id===id);
  if(!confirm(`Supprimer ${p?.prenom} ${p?.nom} ?`)) return;
  const {error} = await sb.from('patients').delete().eq('id',id);
  if(!error) { STATE.patients = STATE.patients.filter(x=>x.id!==id); toast('Patient supprimé'); renderView($('main-content')); }
}

function toggleSymptome(cb, s, color) {
  if(cb.checked) { _checkedSymptomes[s]=true; cb.parentElement.style.color='var(--text)'; }
  else { delete _checkedSymptomes[s]; cb.parentElement.style.color='var(--text2)'; }
  updateScore();
}

function updateScore() {
  let total=0, max=0;
  PATTERNS.forEach(p=>{ max+=p.symptomes.length; p.symptomes.forEach(s=>{ if(_checkedSymptomes[s]) total++; }); });
  const score = max>0?Math.round((total/max)*100):0;
  const bar = $('score-bar'), label = $('score-label');
  if(bar) { bar.style.width=score+'%'; bar.style.background=`hsl(${score},70%,50%)`; }
  if(label) label.textContent=`Score : ${score}%`;

  const detected = PATTERNS.filter(p=>p.symptomes.filter(s=>_checkedSymptomes[s]).length>=p.seuil);
  const carencesEl = $('carences-detectees');
  if(carencesEl) {
    if(detected.length>0) {
      carencesEl.innerHTML=`<div style="padding:1rem;background:rgba(63,182,139,0.08);border-radius:10px;border:1px solid rgba(63,182,139,0.2);margin-bottom:1rem">
        <div class="card-title" style="color:var(--accent)">✅ Carences prioritaires détectées</div>
        ${detected.map(p=>`<div style="margin-bottom:.5rem">
          <div style="font-size:.8rem;font-weight:600;color:${p.color}">${p.label}</div>
          <div style="font-size:.78rem;color:var(--text2)">${p.carences.join(' · ')}</div>
        </div>`).join('')}
      </div>`;
    } else carencesEl.innerHTML='';
  }
}

function filterSuppsModal(search) {
  const resultsEl = $('supp-results');
  if(!search||search.length<2) { if(resultsEl) resultsEl.innerHTML=''; return; }
  const filtered = SUPPLEMENTS.filter(s=>`${s.nom} ${s.indications||''}`.toLowerCase().includes(search.toLowerCase())).slice(0,6);
  if(resultsEl) {
    resultsEl.innerHTML=filtered.length===0?'':`<div style="background:var(--bg3);border-radius:8px;padding:.5rem;max-height:180px;overflow-y:auto">
      ${filtered.map(s=>`
        <div onclick="addToProtocole('${s.id}')" style="padding:.4rem .65rem;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center"
          onmouseover="this.style.background='var(--accent-dim)'" onmouseout="this.style.background=''">
          <div>
            <div style="font-size:.8rem;font-weight:500">${s.nom}</div>
            <div style="font-size:.72rem;color:var(--text2)">${s.dose||''}</div>
          </div>
          ${_protocole.find(x=>x.id===s.id)?'<span style="color:var(--accent)">✓</span>':''}
        </div>
      `).join('')}
    </div>`;
  }
}

function addToProtocole(id) {
  const s = SUPPLEMENTS.find(x=>x.id===id);
  if(!s) return;
  if(_protocole.find(x=>x.id===id)) { _protocole=_protocole.filter(x=>x.id!==id); }
  else { _protocole.push({id:s.id,nom:s.nom,dose:s.dose||''}); }
  renderProtocole();
  const searchVal = $('supp-search')?.value;
  if(searchVal) filterSuppsModal(searchVal);
}

function renderProtocole() {
  const el=$('protocole-list');
  if(!el) return;
  if(_protocole.length===0) { el.innerHTML=''; return; }
  el.innerHTML=`<div style="font-size:.78rem;color:var(--text2);margin-bottom:.5rem">${_protocole.length} supplément${_protocole.length>1?'s':''} sélectionné${_protocole.length>1?'s':''}</div>

  if(!patientId) { if(alertEl) alertEl.innerHTML='<div class="alert alert-error">Sélectionnez un patient</div>'; return; }

  let total=0, max=0;
  PATTERNS.forEach(p=>{ max+=p.symptomes.length; p.symptomes.forEach(s=>{ if(_checkedSymptomes[s]) total++; }); });
  const score = max>0?Math.round((total/max)*100):0;
  const patternsDetectes = PATTERNS.filter(p=>p.symptomes.filter(s=>_checkedSymptomes[s]).length>=p.seuil).map(p=>p.id);

  const data = {
    therapist_id: STATE.user.id,
    patient_id: patientId,
    titre: $('c-titre')?.value?.trim()||'Consultation',
    type_consultation: $('c-type')?.value||'Bilan initial',
    profil_patient: $('c-profil')?.value||'general',
    motif: $('c-motif')?.value?.trim(),
    alimentation: {freqs:_alimFreqs, comportements:_comportements, regimes:_regimes},
    antecedents: $('c-antec')?.value?.trim(),
    medicaments: $('c-meds')?.value?.trim(),
    allergies: $('c-allerg')?.value?.trim(),
    objectifs: $('c-objectifs')?.value?.trim(),
    notes: $('c-notes')?.value?.trim(),
    protocole: _protocole,
    bilan: {symptomes:_checkedSymptomes, score, patternsDetectes},
    date_consultation: new Date().toISOString(),
  };

  try {
    const {data:res,error} = await sb.from('consultations').insert([data]).select().single();
    if(error) throw error;
    STATE.consultations.unshift(res);
    toast('Consultation enregistrée ✅');
    closeModal();
    renderView($('main-content'));
  } catch(e) { if(alertEl) alertEl.innerHTML=`<div class="alert alert-error">${tradErr(e.message)}</div>`; }
}

let _rdvs = [];
async function renderAgenda(el) {
  if(_rdvs.length===0) {
    const {data} = await sb.from('agenda').select('*').eq('therapist_id',STATE.user.id).order('date_rdv');
    _rdvs = data||[];
  }
  const now = new Date(Date.now()-86400000);
  const upcoming = _rdvs.filter(r=>new Date(r.date_rdv)>=now);
  const grouped = {};
  upcoming.forEach(r=>{
    const day=new Date(r.date_rdv).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    if(!grouped[day]) grouped[day]=[];
    grouped[day].push(r);
  });

  html(el, `
    <div class="page-header">
      <div><div class="page-title">Agenda</div><div class="page-sub">Rendez-vous à venir</div></div>
      <button class="btn btn-primary" onclick="openRdvModal()">＋ Nouveau RDV</button>
    </div>
    ${Object.keys(grouped).length===0?'<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Aucun rendez-vous</div></div>':
      Object.entries(grouped).map(([day,rs])=>`
        <div class="agenda-day">
          <div class="agenda-day-hdr">${day}</div>
          ${rs.map(r=>{
            const p=STATE.patients.find(x=>x.id===r.patient_id);

              <div class="rdv-time">${new Date(r.date_rdv).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
              <div style="flex:1">
                <div class="rdv-title">${r.titre}</div>
                <div class="rdv-patient">${p?`${p.prenom} ${p.nom}`:''}${r.duree_minutes?` · ${r.duree_minutes} min`:''}</div>
              </div>
              <button class="btn btn-danger btn-sm" onclick="deleteRdv('${r.id}')">🗑️</button>

async function saveRdv() {
  const titre=$('rdv-titre')?.value?.trim(), date=$('rdv-date')?.value;
  const alertEl=$('rdv-alert');
  if(!titre||!date){if(alertEl)alertEl.innerHTML='<div class="alert alert-error">Titre et date requis</div>';return;}
  try {
    const {data,error}=await sb.from('agenda').insert([{therapist_id:STATE.user.id,patient_id:$('rdv-patient')?.value||null,titre,date_rdv:new Date(date).toISOString(),duree_minutes:parseInt($('rdv-duree')?.value)||60,notes:$('rdv-notes')?.value}]).select().single();
    if(error)throw error;
    _rdvs=[..._rdvs,data].sort((a,b)=>new Date(a.date_rdv)-new Date(b.date_rdv));
    toast('RDV ajouté');closeModal();renderView($('main-content'));
  }catch(e){if(alertEl)alertEl.innerHTML=`<div class="alert alert-error">${tradErr(e.message)}</div>`;}
}

async function deleteRdv(id){
  if(!confirm('Supprimer ce RDV ?'))return;
  await sb.from('agenda').delete().eq('id',id);
  _rdvs=_rdvs.filter(r=>r.id!==id);toast('RDV supprimé');renderView($('main-content'));
}

async function sendChat(mode) {
  const input=$('chat-input');
  if(!input||!input.value.trim()||_chatLoading) return;
  const msg = input.value.trim();
  input.value='';
  _chatLoading=true;

  if(!_chatMessages[mode]) _chatMessages[mode]=[];
  _chatMessages[mode].push({role:'user',content:msg});
  renderView($('main-content'));

  const cfg = window._chatCfg?.[mode]||{};
  try {
    const resp = await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+OR_KEY,'HTTP-Referer':'https://chaizelouis.github.io','X-Title':'Naturia'},
      body:JSON.stringify({
        model:'meta-llama/llama-3.3-70b-instruct:free', max_tokens:1200,
        messages:[{role:'system',content:cfg.system||'Tu es un assistant bienveillant.'}, ..._chatMessages[mode].filter((_,i)=>i>0).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.content}))]
      })
    });
    const data=await resp.json();
    const reply=data.choices?.[0]?.message?.content||'Désolé, je n\'ai pas pu générer une réponse.';
    _chatMessages[mode].push({role:'ai',content:reply});
  } catch(e) {
    _chatMessages[mode].push({role:'ai',content:'❌ Erreur de connexion. Vérifiez la clé API Anthropic.'});
  }
  _chatLoading=false;
  renderView($('main-content'));
}

let _alimSearch = '';
let _alimCat = 'tous';
let _alimSous = 'tous';

const ALIM_CATS = {
  tous:'Tous',laitages:'🥛 Laitages',proteines:'🥩 Protéines',legumes:'🥦 Légumes',
  fruits:'🍎 Fruits',legumineuses:'🫘 Légumineuses',cereales:'🌾 Céréales',
  oleagineux:'🥜 Oléagineux',huiles:'🫙 Huiles'
};

function renderAlimentation(el) {
  const filtered = ALIMENTS.filter(a => {
    const ms = !_alimSearch || `${a.nom} ${a.sous||''} ${a.benefices}`.toLowerCase().includes(_alimSearch.toLowerCase());
    const mc = _alimCat==='tous' || a.cat===_alimCat;
    const ms2 = _alimSous==='tous' || a.sous===_alimSous;
    return ms && mc && ms2;
  });

  // Sous-catégories disponibles
  const sousCats = ['tous',...new Set(ALIMENTS.filter(a=>_alimCat==='tous'||a.cat===_alimCat).map(a=>a.sous).filter(Boolean))];

  html(el, `
    <div class="page-header">
      <div>
        <div class="page-title">Alimentation</div>
        <div class="page-sub">${ALIMENTS.length} aliments · Valeurs nutritionnelles & bénéfices cliniques</div>
      </div>
      <button class="btn btn-primary" onclick="openPlanAlimentaire()">＋ Plan alimentaire</button>
    </div>

    <div style="display:flex;gap:.75rem;margin-bottom:1rem">
      <div class="search-wrap" style="max-width:380px">
        <span class="search-icon">🔍</span>
        <input class="form-input" placeholder="Rechercher un aliment…" value="${_alimSearch}"
          oninput="_alimSearch=this.value;renderView($('main-content'))">
      </div>
    </div>

    <div class="filter-pills" style="margin-bottom:.5rem">
      ${Object.entries(ALIM_CATS).map(([k,v])=>`
        <span class="pill ${_alimCat===k?'active':''}" onclick="_alimCat='${k}';_alimSous='tous';renderView($('main-content'))">${v}</span>
      `).join('')}
    </div>

    ${sousCats.length>2?`
    <div class="filter-pills" style="margin-bottom:1rem">
      ${sousCats.map(s=>`
        <span class="pill ${_alimSous===s?'active':''}" style="font-size:.72rem" onclick="_alimSous='${s}';renderView($('main-content'))">${s==='tous'?'Toutes catégories':s}</span>
      `).join('')}
    </div>`:'<div style="margin-bottom:1rem"></div>'}

    <div style="font-size:.8rem;color:var(--text2);margin-bottom:1rem">${filtered.length} aliment${filtered.length>1?'s':''}</div>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Aliment</th><th>Catégorie</th>
            <th style="text-align:center">Cal/100g</th>
            <th style="text-align:center">Prot.</th>
            <th style="text-align:center">Lip.</th>
            <th style="text-align:center">Glu.</th>
            <th>Bénéfices</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map(a=>`
            <tr style="cursor:pointer" onclick="showAliment('${a.id}')">
              <td><div style="font-weight:500">${a.nom}</div></td>
              <td><span class="badge badge-gray" style="font-size:.7rem">${a.sous||a.cat}</span></td>
              <td style="text-align:center;font-size:.85rem">${a.cal}</td>
              <td style="text-align:center;font-size:.85rem;color:var(--info)">${a.prot}g</td>
              <td style="text-align:center;font-size:.85rem;color:var(--warning)">${a.lip}g</td>
              <td style="text-align:center;font-size:.85rem;color:var(--accent)">${a.glu}g</td>
              <td style="font-size:.78rem;color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.benefices}</td>
              <td><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();showAliment('${a.id}')">Détail</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `);
}

function showAliment(id) {
  const a = ALIMENTS.find(x=>x.id===id);
  if(!a) return;
  modal(`
    <div class="modal-header">
      <div>
        <div class="modal-title">${a.nom}</div>
        <div style="font-size:.8rem;color:var(--text2);margin-top:.2rem">${a.cat} · ${a.sous||''}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Valeurs nutritionnelles -->
      <div class="card-title">📊 Valeurs nutritionnelles (pour 100g)</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1.5rem">
        ${[['🔥 Calories',a.cal,'kcal','var(--text)'],['💪 Protéines',a.prot,'g','var(--info)'],['🧈 Lipides',a.lip,'g','var(--warning)'],['🌾 Glucides',a.glu,'g','var(--accent)']].map(([label,val,unit,color])=>`
          <div style="background:var(--bg3);border-radius:10px;padding:1rem;text-align:center">
            <div style="font-size:.78rem;color:var(--text2);margin-bottom:.3rem">${label}</div>
            <div style="font-family:'Fraunces',serif;font-size:1.6rem;font-weight:600;color:${color}">${val}</div>
            <div style="font-size:.72rem;color:var(--text3)">${unit}</div>
          </div>
        `).join('')}
      </div>
      ${a.indice_ig!==undefined?`
        <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;padding:.75rem;background:var(--bg3);border-radius:8px">
          <div style="font-size:.85rem;font-weight:500">Indice glycémique :</div>
          <span class="badge ${a.indice_ig<55?'badge-green':a.indice_ig<70?'badge-yellow':'badge-red'}">${a.indice_ig} — ${a.indice_ig<55?'Bas (favorable)':a.indice_ig<70?'Modéré':'Élevé'}</span>
        </div>
      `:''}
      <div class="grid-2">
        <div>
          <div class="card-title">✅ Bénéfices cliniques</div>
          <p style="font-size:.875rem;line-height:1.7;color:var(--text)">${a.benefices}</p>
          ${a.note?`<div style="margin-top:.75rem;padding:.75rem;background:rgba(63,182,139,0.08);border-radius:8px;border-left:3px solid var(--accent)"><div style="font-size:.78rem;color:var(--accent);font-weight:600;margin-bottom:.2rem">💡 Conseil clinique</div><div style="font-size:.82rem;color:var(--text2)">${a.note}</div></div>`:''}
        </div>
        <div>
          <div class="card-title">⚠️ Contre-indications</div>
          <p style="font-size:.875rem;line-height:1.7;color:var(--danger)">${a.ci||'Aucune connue aux doses alimentaires'}</p>
        </div>
      </div>
    </div>
  `, 'modal-lg');
}

// ── PLANS ALIMENTAIRES ────────────────────────────────────────────
function openPlanAlimentaire() {
  modal(`
    <div class="modal-header">
      <div class="modal-title">＋ Nouveau plan alimentaire</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="plan-alert"></div>
      <div class="form-group"><label class="form-label">Patient</label>
        <select class="form-input" id="plan-patient">
          <option value="">Sélectionner un patient…</option>
          ${STATE.patients.map(p=>`<option value="${p.id}">${p.prenom} ${p.nom}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Titre du plan</label>
        <input class="form-input" id="plan-titre" placeholder="Ex: Plan anti-inflammatoire · Semaine 1">
      </div>
      <div class="form-group"><label class="form-label">Objectif</label>
        <input class="form-input" id="plan-objectif" placeholder="Ex: Réduire l'inflammation, améliorer le microbiote…">
      </div>
      <hr class="divider">
      <div class="card-title">🌅 Petit-déjeuner</div>
      <textarea class="form-input" id="plan-pdj" style="min-height:80px" placeholder="Yaourt de brebis + myrtilles + graines de chia · 1 œuf à la coque · Thé vert…"></textarea>
      <div class="card-title" style="margin-top:1rem">☀️ Déjeuner</div>
      <textarea class="form-input" id="plan-dej" style="min-height:80px" placeholder="Saumon grillé + quinoa + brocoli vapeur · Huile d'olive + citron…"></textarea>
      <div class="card-title" style="margin-top:1rem">🌙 Dîner</div>
      <textarea class="form-input" id="plan-din" style="min-height:80px" placeholder="Soupe de lentilles + légumes racines · Fromage de chèvre frais…"></textarea>
      <div class="card-title" style="margin-top:1rem">🍎 Collations</div>
      <textarea class="form-input" id="plan-col" style="min-height:60px" placeholder="Poignée d'amandes + 1 pomme · Kéfir de chèvre…"></textarea>
      <div class="form-group" style="margin-top:1rem"><label class="form-label">Notes & recommandations</label>
        <textarea class="form-input" id="plan-notes" style="min-height:80px" placeholder="Éviter le gluten 3 semaines · Boire 1,5L d'eau · Manger lentement…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="savePlanAlimentaire()">Enregistrer le plan</button>
    </div>
  `, 'modal-lg');
}

async function savePlanAlimentaire() {
  const alertEl = $('plan-alert');
  const patientId = $('plan-patient')?.value;
  const titre = $('plan-titre')?.value?.trim();
  if(!patientId||!titre) { if(alertEl) alertEl.innerHTML='<div class="alert alert-error">Patient et titre requis</div>'; return; }

  const plan = {
    therapist_id: STATE.user.id,
    patient_id: patientId,
    titre,
    objectif: $('plan-objectif')?.value?.trim(),
    petit_dejeuner: $('plan-pdj')?.value?.trim(),
    dejeuner: $('plan-dej')?.value?.trim(),
    diner: $('plan-din')?.value?.trim(),
    collations: $('plan-col')?.value?.trim(),
    notes: $('plan-notes')?.value?.trim(),
    type_consultation: 'Plan alimentaire',
    protocole: [],
    bilan: {score:0},
    date_consultation: new Date().toISOString(),
  };

  try {
    const {data,error} = await sb.from('consultations').insert([plan]).select().single();
    if(error) throw error;
    STATE.consultations.unshift(data);
    toast('Plan alimentaire enregistré ✅');
    closeModal();
  } catch(e) {
    if(alertEl) alertEl.innerHTML=`<div class="alert alert-error">${tradErr(e.message)}</div>`;
  }
}

const COMPORTEMENTS = [
  'Petit-déjeuner sauté régulièrement','Déjeuner sauté ou avalé en 10 min',
  'Grignotage entre les repas','Alimentation émotionnelle (stress → sucre)',
  'Repas tardifs (après 20h)','Alimentation très répétitive / peu variée',
  'Alimentation quasi-exclusivement industrielle','Repas rarement cuisinés maison',
  'Mastication insuffisante (repas avalés vite)','Consommation excessive de sel',
  'Hydratation insuffisante (< 1,5 L/j)','Régimes restrictifs fréquents',
];

const REGIMES = [
  {label:'Végétarien (avec œufs/laitiers)', key:'vegetarien'},
  {label:'Vegan strict (aucun produit animal)', key:'vegan'},
  {label:'Paléo / carnivore', key:'paleo'},
  {label:'Régime sans gluten', key:'sansgluten'},
  {label:'Régime sans lactose', key:'sanslactose'},
  {label:'Régime cétogène / low-carb', key:'keto'},
  {label:'Jeûne intermittent (16:8 ou plus)', key:'ji'},
  {label:'Régime hypocalorique strict', key:'hypo'},
  {label:'Intolérance FODMAP', key:'fodmap'},
  {label:'Régime méditerranéen', key:'med'},
  {label:'Régime anti-inflammatoire', key:'antiinflam'},
];

let _alimFreqs = {};
let _comportements = [];
let _regimes = [];

function initAlimConsult() {
  // Grille alimentation
  const grid = $('alim-consult-grid');
  if(grid) {
    grid.innerHTML = ALIM_CATEGORIES.map(cat=>`
      <div class="card" style="padding:.75rem">
        <div style="font-size:.72rem;font-weight:600;color:var(--accent);margin-bottom:.5rem;text-transform:uppercase">${cat.label}</div>
        ${cat.items.map(item=>{
          const key=item.replace(/[^a-zA-Z0-9]/g,'');
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:.25rem 0;border-bottom:1px solid var(--border2)">
            <span style="font-size:.78rem">${item}</span>
            <div style="display:flex;align-items:center;gap:.4rem">
              <button onclick="changeAlimF('${key}',-1)" style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;width:22px;height:22px;cursor:pointer;color:var(--text)">−</button>
              <span id="alimf-${key}" style="font-size:.75rem;color:var(--text2);min-width:45px;text-align:center">${_alimFreqs[key]||0}×/sem</span>
              <button onclick="changeAlimF('${key}',+1)" style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;width:22px;height:22px;cursor:pointer;color:var(--text)">+</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    `).join('');
  }

  // Comportements
  const comp = $('comportements-consult');
  if(comp) {
    comp.innerHTML = COMPORTEMENTS.map((c,i)=>`
      <span onclick="toggleComp(${i},this)" style="padding:.3rem .75rem;border-radius:20px;font-size:.78rem;cursor:pointer;border:1px solid var(--border);background:${_comportements.includes(i)?'var(--accent-dim)':'var(--bg3)'};color:${_comportements.includes(i)?'var(--accent)':'var(--text2)'}">${c}</span>
    `).join('');
  }

  // Régimes
  const reg = $('regimes-consult');
  if(reg) {
    reg.innerHTML = REGIMES.map(r=>`
      <span onclick="toggleReg('${r.key}',this)" style="padding:.3rem .75rem;border-radius:20px;font-size:.78rem;cursor:pointer;border:1px solid var(--border);background:${_regimes.includes(r.key)?'var(--accent-dim)':'var(--bg3)'};color:${_regimes.includes(r.key)?'var(--accent)':'var(--text2)'}">${r.label}</span>
    `).join('');
  }
}

function changeAlimF(key, delta) {
  _alimFreqs[key] = Math.max(0, Math.min(7, (_alimFreqs[key]||0)+delta));
  const el = $('alimf-'+key);
  if(el) el.textContent = _alimFreqs[key]+'×/sem';
}

function toggleComp(i, el) {
  if(_comportements.includes(i)) { _comportements=_comportements.filter(x=>x!==i); el.style.background='var(--bg3)'; el.style.color='var(--text2)'; }
  else { _comportements.push(i); el.style.background='var(--accent-dim)'; el.style.color='var(--accent)'; }
}

function toggleReg(key, el) {
  if(_regimes.includes(key)) { _regimes=_regimes.filter(x=>x!==key); el.style.background='var(--bg3)'; el.style.color='var(--text2)'; }
  else { _regimes.push(key); el.style.background='var(--accent-dim)'; el.style.color='var(--accent)'; }
}

</script>
